worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Basic API Gateway Routing & Load Balancing Setup
    
    upstream auth_service {
        server api-auth:3000;
    }

    upstream shipment_service {
        server api-shipment:3000;
    }

    upstream tracking_service {
        server api-tracking:3000;
    }
    
    # Optional shared upstream for anything not decoupled yet
    upstream monolith_service {
        server api:3000; 
    }

    server {
        listen 80;

        # Rate Limiting Zones (Nginx Level)
        # zone=mylimit:10m rate=10r/s;

        # Auth Service Microservice Route
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Shipment Service Microservice Route
        location /api/v1/shipments/ {
            proxy_pass http://shipment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Tracking Service Microservice Route
        location /api/v1/tracking/ {
            proxy_pass http://tracking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback routes to Monolith for now (Swagger, Metrics, etc)
        location / {
            proxy_pass http://monolith_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
