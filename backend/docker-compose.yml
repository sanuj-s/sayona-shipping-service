# ─────────────────────────────────────────────
# Docker Compose — Sayona Shipping Platform
# Usage: docker-compose up -d
# ─────────────────────────────────────────────
version: '3.8'

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sayona_shipping}
      POSTGRES_USER: ${DB_USER:-sayona}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USER:-sayona} -d ${DB_NAME:-sayona_shipping}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger (OpenTelemetry) ──
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - '16686:16686' # UI
      - '14268:14268' # HTTP collector
      - '4318:4318' # OTLP HTTP

  # ── Prometheus (Metrics) ──
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Grafana (Dashboards) ──
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - '3005:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  # ── MinIO (S3 Storage) ──
  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── Elasticsearch (Search Engine) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ── Redis (Cache & Queue) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  # ── API Services (Macro-service Shims) ──
  api-auth:
    build: .
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SERVICE_NAME: auth
      ENABLE_TRACING: 'true'
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  api-shipment:
    build: .
    restart: unless-stopped
    ports:
      - '3002:3000'
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SERVICE_NAME: shipment
      ENABLE_TRACING: 'true'
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  api-tracking:
    build: .
    restart: unless-stopped
    ports:
      - '3003:3000'
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SERVICE_NAME: tracking
      ENABLE_TRACING: 'true'
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  api:
    # Keep monolith fallback for Admin/Docs/Metrics
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SERVICE_NAME: monolith
      ENABLE_TRACING: 'true'
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Nginx API Gateway ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-auth
      - api-shipment
      - api-tracking
      - api

volumes:
  pgdata:
    driver: local
  minio_data:
    driver: local
  es_data:
    driver: local
