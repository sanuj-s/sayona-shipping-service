<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sayona Shipping Service - Premium global logistics and freight forwarding solutions.">

    <title>Dashboard — Sayona Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Sayona Shipping</h2>
                <span>Admin Panel</span>
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html" class="active">
                        <span class="nav-icon">📊</span> Dashboard
                    </a></li>
                <li><a href="shipments.html">
                        <span class="nav-icon">📦</span> Shipments
                    </a></li>
                <li><a href="create-shipment.html">
                        <span class="nav-icon">➕</span> Create Shipment
                    </a></li>
                <li><a href="quotes.html">
                        <span class="nav-icon">📄</span> Quotes
                    </a></li>
                <li><a href="contacts.html">
                        <span class="nav-icon">💬</span> Contacts
                    </a></li>
                <li><a href="users.html">
                        <span class="nav-icon">👥</span> Users
                    </a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-outline btn-sm">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Dashboard</h1>
                <div class="topbar-right">
                    <span class="admin-badge" id="adminName">Admin</span>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon purple">📦</div>
                        <div class="stat-value" id="totalShipments">—</div>
                        <div class="stat-label">Total Shipments</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow">⏳</div>
                        <div class="stat-value" id="pendingCount">—</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">🚚</div>
                        <div class="stat-value" id="transitCount">—</div>
                        <div class="stat-label">In Transit</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">✅</div>
                        <div class="stat-value" id="deliveredCount">—</div>
                        <div class="stat-label">Delivered</div>
                    </div>
                </div>

                <!-- Recent Shipments -->
                <div class="card">
                    <div class="card-header">
                        <h2>Recent Shipments</h2>
                        <a href="shipments.html" class="btn btn-outline btn-sm">View All →</a>
                    </div>
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Tracking ID</th>
                                        <th>Sender</th>
                                        <th>Receiver</th>
                                        <th>Industry</th>
                                        <th>Route</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="recentShipmentsBody">
                                    <tr>
                                        <td colspan="7">
                                            <div class="spinner"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
