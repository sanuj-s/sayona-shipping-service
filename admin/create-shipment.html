<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sayona Shipping Service - Premium global logistics and freight forwarding solutions.">

    <title>Create Shipment — Sayona Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Sayona Shipping</h2>
                <span>Admin Panel</span>
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">
                        <span class="nav-icon">📊</span> Dashboard
                    </a></li>
                <li><a href="shipments.html">
                        <span class="nav-icon">📦</span> Shipments
                    </a></li>
                <li><a href="create-shipment.html" class="active">
                        <span class="nav-icon">➕</span> Create Shipment
                    </a></li>
                <li><a href="quotes.html">
                        <span class="nav-icon">📄</span> Quotes
                    </a></li>
                <li><a href="contacts.html">
                        <span class="nav-icon">💬</span> Contacts
                    </a></li>
                <li><a href="users.html">
                        <span class="nav-icon">👥</span> Users
                    </a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-outline btn-sm">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Create Shipment</h1>
                <div class="topbar-right">
                    <span class="admin-badge" id="adminName">Admin</span>
                </div>
            </header>

            <div class="page-content">
                <div class="card" style="max-width: 680px;">
                    <div class="card-header">
                        <h2>New Shipment</h2>
                    </div>
                    <div class="card-body">
                        <form id="createShipmentForm">
                            <div class="detail-grid">
                                <div class="form-group">
                                    <label for="trackingNumber">Tracking Number</label>
                                    <input type="text" id="trackingNumber" class="form-control"
                                        placeholder="e.g. SAY-2026-00001" required>
                                </div>
                                <div class="form-group">
                                    <label for="clientEmail">Client Email (Optional)</label>
                                    <input type="email" id="clientEmail" class="form-control"
                                        placeholder="user@example.com">
                                </div>
                            </div>
                            <div class="detail-grid">
                                <div class="form-group">
                                    <label for="senderName">Sender Name</label>
                                    <input type="text" id="senderName" class="form-control" placeholder="Full name"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="senderAddress">Origin / Sender Address</label>
                                    <input type="text" id="senderAddress" class="form-control"
                                        placeholder="City, Country" required>
                                </div>
                            </div>
                            <div class="detail-grid">
                                <div class="form-group">
                                    <label for="receiverName">Receiver Name</label>
                                    <input type="text" id="receiverName" class="form-control" placeholder="Full name"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="receiverAddress">Destination / Receiver Address</label>
                                    <input type="text" id="receiverAddress" class="form-control"
                                        placeholder="City, Country" required>
                                </div>
                            </div>
                            <div class="detail-grid">
                                <div class="form-group">
                                    <label for="shippingType">Service Type</label>
                                    <select id="shippingType" class="form-control">
                                        <option value="standard">Standard Shipping</option>
                                        <option value="express">Express Delivery</option>
                                        <option value="same-day">Same Day Service</option>
                                        <option value="international">Global Freight</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="industryType">Industry Type</label>
                                    <select id="industryType" class="form-control">
                                        <option value="General Cargo">General Cargo</option>
                                        <option value="Textile & Apparel">Textile & Apparel</option>
                                        <option value="High-Tech & Electronics">High-Tech & Electronics</option>
                                        <option value="Pharmaceuticals">Pharmaceuticals</option>
                                        <option value="Automotive">Automotive</option>
                                        <option value="Agri Products">Agri Products</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Package Dimensions & Weight</label>
                                <div class="package-grid">
                                    <div class="form-group">
                                        <input type="number" id="weight" class="form-control" placeholder="Weight (kg)"
                                            step="0.1" required>
                                    </div>
                                    <div class="form-group">
                                        <input type="number" id="length" class="form-control" placeholder="L (cm)"
                                            step="1" required>
                                    </div>
                                    <div class="form-group">
                                        <input type="number" id="width" class="form-control" placeholder="W (cm)"
                                            step="1" required>
                                    </div>
                                    <div class="form-group">
                                        <input type="number" id="height" class="form-control" placeholder="H (cm)"
                                            step="1" required>
                                    </div>
                                </div>
                            </div>

                            <div class="pricing-preview">
                                <div class="price-info">
                                    <div class="price-label">Estimated Shipping Cost</div>
                                    <div class="price-help"
                                        style="font-size: 0.7rem; color: var(--accent-hover); opacity: 0.8;">Based on
                                        weight, dimensions, and distance</div>
                                </div>
                                <div class="price-value" id="pricePreview">$0.00</div>
                            </div>

                            <div style="display: flex; gap: 12px; margin-top: 8px;">
                                <button type="submit" class="btn btn-primary">Create Shipment</button>
                                <a href="shipments.html" class="btn btn-outline">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/create-shipment.js"></script>
</body>

</html>
